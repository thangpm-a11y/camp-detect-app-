<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:;"
  />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camping Detect Control</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-0: #000000;
      --bg-1: #020617;
      --bg-2: #0f172a;
      --bg-3: rgba(15, 23, 42, 0.96);

      /* Minimalist: viền rất mảnh, gần như ẩn */
      --line-1: rgba(255, 255, 255, 0.10);
      --line-2: rgba(255, 255, 255, 0.06);
      --line-3: rgba(255, 255, 255, 0.06);

      --text-1: #e5e7eb;
      --text-2: #cbd5e1;
      --text-3: #9ca3af;
      --text-4: #6b7280;

      --input-bg: rgba(255, 255, 255, 0.04);
      --input-border: rgba(255, 255, 255, 0.10);

      --btn-open: linear-gradient(90deg, #0ea5e9, #3b82f6);
      --btn-log: linear-gradient(90deg, #22c55e, #16a34a);
      --btn-click: linear-gradient(90deg, #facc15, #eab308);
      --btn-read: linear-gradient(90deg, #38bdf8, #2563eb);

      --shadow-main: none;
      --shadow-soft: none;
      --radius-lg: 10px;
      --radius-md: 8px;
      --radius-sm: 6px;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: var(--text-1);
      background: #0a0f1a;
    }

    body {
      overflow: hidden;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      height: 100vh;
    }

    .app-header {
      padding: 10px 14px;
      background: #0b1220;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .app-main {
      flex: 1 1 auto;
      min-height: 0;
      padding: 10px 14px 14px 14px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      overflow: hidden;
    }

    .section {
      padding: 10px 12px;
      border-radius: var(--radius-lg);
      background: var(--bg-3);
      border: 1px solid var(--line-2);
      box-shadow: var(--shadow-main);
      min-width: 0;
    }

    .section h2 {
      margin: 0 0 8px 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    label {
      font-size: 12px;
      color: var(--text-3);
      display: block;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 7px 9px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-1);
      font-size: 13px;
      outline: none;
      box-shadow: var(--shadow-soft);
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--text-4);
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #2563eb;
      box-shadow:
        0 0 0 1px rgba(37, 99, 235, 0.7),
        0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .btn-row {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 6px 11px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.08s ease, opacity 0.15s ease;
    }

    button:hover {
      opacity: 0.95;
    }

    button:active {
      transform: translateY(1px);
    }

    .btn-open {
      background: var(--btn-open);
      color: #0b1220;
    }

    .btn-log {
      background: var(--btn-log);
      color: #022c22;
    }

    .btn-test-click {
      background: var(--btn-click);
      color: #0b1220;
    }

    .btn-read-text {
      background: var(--btn-read);
      color: #020617;
    }

    .status-box {
      margin-top: 8px;
      padding: 7px 9px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line-3);
      background: #020617;
      font-size: 12px;
      color: var(--text-3);
      min-height: 34px;
      display: flex;
      align-items: center;
      word-break: break-word;
    }

    .control-stack {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      min-height: 0;
      flex: 0 0 auto;
    }

    .detectlab-section {
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1 1 auto;
      overflow: hidden;
    }

    .detectlab-frame {
      margin-top: 8px;
      flex: 1 1 auto;
      min-height: 280px;
      height: 100%;
      border-radius: var(--radius-md);
      border: 1px solid rgba(255,255,255,0.07);
      background:
        linear-gradient(180deg, rgba(2, 6, 23, 0.94), rgba(2, 6, 23, 0.98));
      padding: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #detectlab-root {
      flex: 1 1 auto;
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .footer-note {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-4);
    }

    /* ── Preview panel ───────────────────────────────── */
    .preview-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      overflow: hidden;
    }

    .preview-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: rgba(15,23,42,0.96);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      flex: 0 0 auto;
    }

    .preview-panel-header span {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .preview-pin-btn {
      padding: 3px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(31,41,55,0.8);
      color: #9ca3af;
      font-size: 11px;
      cursor: pointer;
    }

    .preview-pin-btn.pinned {
      border-color: #3b82f6;
      color: #60a5fa;
      background: rgba(37,99,235,0.15);
    }

    .preview-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1 1 auto;
      overflow-y: auto;
      min-height: 0;
    }

    /* Khi được ghim — chuyển sang hàng ngang */
    .preview-list.pinned-horizontal {
      flex-direction: row;
      overflow-x: auto;
      overflow-y: hidden;
      flex: 0 0 auto;
    }

    .slot-preview-card {
      position: relative;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.07);
      background: #020617;
      overflow: hidden;
      flex: 0 0 auto;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .slot-preview-card:hover {
      border-color: rgba(59,130,246,0.8);
    }

    .slot-preview-card.active-slot {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
    }

    /* Chế độ dọc: mỗi card chiếm full width */
    .preview-list:not(.pinned-horizontal) .slot-preview-card {
      width: 100%;
    }

    /* Chế độ ngang: mỗi card có chiều rộng cố định */
    .preview-list.pinned-horizontal .slot-preview-card {
      width: var(--pv-card-w, 260px);
    }

    .slot-thumbnail {
      width: 100%;
      display: block;
      object-fit: cover;
      border-radius: 6px 6px 0 0;
      background: #0f172a;
      height: var(--pv-thumb-h, 36px);
    }

    /* Thanh step hiện tại của slot */
    .slot-step-bar {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      background: rgba(2,6,23,0.9);
      border-top: 1px solid rgba(37,99,235,0.2);
      border-bottom: 1px solid rgba(37,99,235,0.2);
      min-height: 20px;
    }

    .slot-step-label {
      font-size: 9px;
      color: #6b7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex: 0 0 auto;
    }

    .slot-step-name {
      font-size: 10px;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .slot-step-name.idle {
      color: #4b5563;
    }

    .slot-status-overlay {
      position: absolute;
      top: 6px;
      left: 6px;
      right: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
    }

    .slot-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex: 0 0 auto;
      background: #6b7280;
    }

    .slot-status-dot.running  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .slot-status-dot.paused   { background: #facc15; }
    .slot-status-dot.stopped  { background: #ef4444; }
    .slot-status-dot.idle     { background: #6b7280; }

    .slot-status-text {
      font-size: 10px;
      color: #e2e8f0;
      background: rgba(2,6,23,0.75);
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    .slot-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
      background: rgba(15,23,42,0.95);
      border-top: 1px solid rgba(37,99,235,0.25);
    }

    .slot-footer-label {
      font-size: 10px;
      font-weight: 700;
      color: #60a5fa;
    }

    .slot-footer-url {
      font-size: 9px;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }

    .slot-action-btns {
      display: flex;
      gap: 4px;
    }

    .slot-action-btns button {
      padding: 2px 7px;
      font-size: 9px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(31,41,55,0.8);
      color: #9ca3af;
      cursor: pointer;
    }

    .slot-action-btns button:hover {
      border-color: #3b82f6;
      color: #60a5fa;
    }

    /* ── Preview layout toggle button ─────────────────────── */
    .preview-layout-btn {
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(31,41,55,0.8);
      color: #9ca3af;
      font-size: 11px;
      cursor: pointer;
      margin-left: 4px;
    }

    .preview-layout-btn:hover {
      border-color: #3b82f6;
      color: #60a5fa;
    }

    /* ── Nút Start All / Pause All ──────────────────────────── */
    .preview-allbtn {
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .preview-startall-btn { background: linear-gradient(90deg,#16a34a,#22c55e); color: #052e16; border-color: #15803d; }
    .preview-startall-btn:hover { filter: brightness(1.1); }
    .preview-pauseall-btn { background: linear-gradient(90deg,#d97706,#f59e0b); color: #2b1900; border-color: #b45309; }
    .preview-pauseall-btn:hover { filter: brightness(1.1); }

    /* ── Nút Start / Pause trên mỗi card ────────────────────── */
    .slot-run-btn {
      padding: 2px 7px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 11px;
      cursor: pointer;
      margin-left: 3px;
    }
    .slot-start-btn { background: rgba(22,163,74,0.85); color: #f0fdf4; border-color: #15803d; }
    .slot-start-btn:hover { background: #16a34a; }
    .slot-pause-btn { background: rgba(217,119,6,0.85); color: #fff7ed; border-color: #b45309; }
    .slot-pause-btn:hover { background: #d97706; }

    /* ── Pinned bar — giữa header và main ──────────────────── */
    .pinned-bar {
      display: none;
      flex-direction: row;
      align-items: stretch;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(2,6,23,0.97);
      border-bottom: 1px solid rgba(37,99,235,0.4);
      overflow-x: auto;
      flex: 0 0 auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(37,99,235,0.4) transparent;
    }

    .pinned-bar::-webkit-scrollbar {
      height: 4px;
    }
    .pinned-bar::-webkit-scrollbar-track { background: transparent; }
    .pinned-bar::-webkit-scrollbar-thumb {
      background: rgba(37,99,235,0.4);
      border-radius: 2px;
    }

    /* Card trong pinned-bar: nằm ngang, cố định chiều rộng */
    .pinned-bar .slot-preview-card {
      width: 220px;
      flex: 0 0 220px;
    }

    /* Khi pinned: app-main thu về 1 cột (chỉ hiện detectlab) */
    .app-shell.preview-pinned .app-main {
      grid-template-columns: 1fr !important;
    }

    /* Ẩn preview panel khi đã pin */
    .app-shell.preview-pinned .preview-panel {
      display: none;
    }

    /* Hiện pinned-bar khi đã pin */
    .app-shell.preview-pinned .pinned-bar {
      display: flex;
    }

    /* Preview list scrollbar */
    .preview-list {
      scrollbar-width: thin;
      scrollbar-color: rgba(37,99,235,0.3) transparent;
    }
    .preview-list::-webkit-scrollbar { width: 4px; height: 4px; }
    .preview-list::-webkit-scrollbar-track { background: transparent; }
    .preview-list::-webkit-scrollbar-thumb {
      background: rgba(37,99,235,0.3);
      border-radius: 2px;
    }

    /* Layout ngang trong preview panel (khi chưa pin, user bấm toggle) */
    .preview-list.layout-horizontal {
      flex-direction: row;
      overflow-x: auto;
      overflow-y: hidden;
      flex: 0 0 auto;
      max-height: calc(var(--pv-thumb-h, 36px) + 110px);
    }

    .preview-list.layout-horizontal .slot-preview-card {
      width: var(--pv-card-w, 200px);
      flex: 0 0 var(--pv-card-w, 200px);
    }

    /* ── Layout ─────────────────────────────────── */
    @media (min-width: 860px) {
      .app-main {
        grid-template-columns: minmax(440px, 500px) minmax(280px, 1fr);
        align-items: stretch;
      }

      .detectlab-section {
        min-height: 0;
        overflow: hidden;
      }

      .detectlab-frame {
        min-height: 0;
      }
    }

    @media (max-width: 859px) {
      body {
        overflow: auto;
      }

      .app-shell {
        height: auto;
        min-height: 100vh;
      }

      .app-main {
        overflow: visible;
      }

      .preview-panel {
        display: none;
      }

      .detectlab-section {
        min-height: 520px;
      }

      .detectlab-frame {
        min-height: 520px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-title">Camping Detect Control</div>
      <div style="display:flex;gap:6px;align-items:center;margin-left:auto;flex-wrap:wrap;">
        <button class="preview-allbtn preview-startall-btn" id="hdr-startall-btn" title="Start / Resume tất cả slot">▶ All</button>
        <button class="preview-allbtn preview-pauseall-btn" id="hdr-pauseall-btn" title="Pause tất cả slot">⏸ All</button>
        <button class="preview-layout-btn" id="hdr-ontop-btn" title="Ghim control luôn nổi trên cùng">📌 Top</button>
        <button class="preview-layout-btn" id="hdr-popout-btn" title="Mở cửa sổ preview nổi riêng (có taskbar)">🗗 Popout</button>
      </div>
    </header>

    <!-- ── Pinned bar — hiện giữa header và main khi pin = true ── -->
    <div class="pinned-bar" id="pinned-bar"></div>

    <main class="app-main">
      <div class="control-stack" style="display:none">
        <section class="section">
          <h2>Google Sheet</h2>

          <label for="gs-api-key">API key</label>
          <input
            id="gs-api-key"
            type="text"
            placeholder="Apps Script web app key / secret"
          />

          <label for="gs-sheet-id">Sheet ID</label>
          <input
            id="gs-sheet-id"
            type="text"
            placeholder="1AbC... (Google Sheet ID)"
          />

          <label for="gs-url-base">URL base</label>
          <input
            id="gs-url-base"
            type="text"
            placeholder="https://script.google.com/.../exec"
          />

          <label for="gs-url-return">URL return</label>
          <input
            id="gs-url-return"
            type="text"
            placeholder="Webhook / return URL"
          />

          <label for="gs-sheet-tab">Sheet tab</label>
          <input
            id="gs-sheet-tab"
            type="text"
            placeholder="Sheet1"
          />

          <div class="btn-row">
            <button id="btn-save-gs-config" class="btn-open">Save config</button>
          </div>

          <section class="section" style="margin-top:8px;">
            <h2>Status</h2>
            <div id="status" class="status-box">Idle</div>
          </section>
        </section>
      </div>

      <section class="section detectlab-section">
        <h2>DetectLab</h2>
        <div class="detectlab-frame">
          <div id="detectlab-root"></div>
        </div>
        <div class="footer-note">
          DetectLab UI is rendered inside this panel by <code>detectlab_app-2.js</code>.
        </div>
      </section>

      <!-- ── Preview panel (cột phải) ── -->
      <div class="preview-panel" id="preview-panel">
        <div class="preview-panel-header" style="flex-wrap:wrap;gap:4px;">
          <span>Preview</span>
          <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
            <button class="preview-allbtn preview-startall-btn" id="preview-startall-btn" title="Start / Resume tất cả slot">▶ All</button>
            <button class="preview-allbtn preview-pauseall-btn" id="preview-pauseall-btn" title="Pause tất cả slot">⏸ All</button>
            <button class="preview-layout-btn" id="preview-ontop-btn" title="Ghim control luôn nổi trên cùng">📌 Top</button>
            <button class="preview-layout-btn" id="preview-popout-btn" title="Mở cửa sổ preview nổi riêng (có taskbar)">🗗 Popout</button>
            <button class="preview-layout-btn" id="preview-layout-btn" title="Toggle dọc / ngang">↕ Dọc</button>
            <button class="preview-pin-btn" id="preview-pin-btn" title="Ghim thanh ngang dưới header">⊞ Pin</button>
            <input type="range" id="preview-size" min="36" max="240" step="6" value="36" title="Kích thước block preview" style="width:80px;" />
          </div>
        </div>
        <div class="preview-list" id="preview-list">
          <!-- slot cards được render bằng JS -->
        </div>
      </div>
    </main>
  </div>

  <!-- Giữ đúng thứ tự: control trước, detectlab app sau -->
  <!-- Nếu file thật của bạn tên là control-3.js / detectlab_app-2.js thì sửa đúng path bên dưới -->
  <script src="./control-3.js"></script>
  <script src="./detectlab_app-2.js"></script>
  <script src="./anti-detect-ui.js"></script>

  <script>
  // ================================================================
  // Preview Panel — Phase 3
  // ================================================================
  (function () {
    "use strict";

    const MAX_SLOTS = 3;

    // ── State per slot ──────────────────────────────────────────
    const slotInfo = {};
    for (let i = 1; i <= MAX_SLOTS; i++) {
      slotInfo[i] = {
        open: false,
        status: "idle",   // idle | running | paused | stopped
        statusText: "",
        url: "",
        thumbDataUrl: null
      };
    }

    let activeSlotId = 1;  // sync với detectlab_app-2.js
    let pinned   = false;
    let layoutH  = false; // false = dọc, true = ngang (chỉ áp dụng khi chưa pin)

    // ── DOM refs ────────────────────────────────────────────────
    const previewList  = document.getElementById("preview-list");
    const pinnedBar    = document.getElementById("pinned-bar");
    const pinBtn       = document.getElementById("preview-pin-btn");
    const layoutBtn    = document.getElementById("preview-layout-btn");
    const startAllBtn  = document.getElementById("preview-startall-btn");
    const pauseAllBtn  = document.getElementById("preview-pauseall-btn");
    const appShell     = document.querySelector(".app-shell");

    // ── Start All / Pause All (cả nút ở header lẫn ở preview panel) ─
    function bindStartAll(btn) {
      if (!btn) return;
      btn.addEventListener("click", function () {
        if (typeof window.__detectlabStartAll === "function") window.__detectlabStartAll();
      });
    }
    function bindPauseAll(btn) {
      if (!btn) return;
      btn.addEventListener("click", function () {
        if (typeof window.__detectlabPauseAll === "function") window.__detectlabPauseAll();
      });
    }
    bindStartAll(startAllBtn);
    bindStartAll(document.getElementById("hdr-startall-btn"));
    bindPauseAll(pauseAllBtn);
    bindPauseAll(document.getElementById("hdr-pauseall-btn"));

    // ── Always-on-top toggle cho control (đồng bộ mọi nút Top) ──
    let controlOnTop = false;
    const onTopBtns = [
      document.getElementById("preview-ontop-btn"),
      document.getElementById("hdr-ontop-btn")
    ].filter(Boolean);
    function refreshOnTopBtns() {
      onTopBtns.forEach(b => {
        b.style.borderColor = controlOnTop ? "#22c55e" : "#374151";
        b.style.color = controlOnTop ? "#4ade80" : "#9ca3af";
        b.textContent = controlOnTop ? "📌 Top ✓" : "📌 Top";
      });
    }
    onTopBtns.forEach(b => {
      b.addEventListener("click", function () {
        controlOnTop = !controlOnTop;
        if (window.controlAPI && typeof window.controlAPI.setControlAlwaysOnTop === "function") {
          window.controlAPI.setControlAlwaysOnTop(controlOnTop);
        }
        refreshOnTopBtns();
      });
    });

    // ── Mở cửa sổ preview nổi riêng (cả 2 nút Popout) ────────────
    function bindPopout(btn) {
      if (!btn) return;
      btn.addEventListener("click", function () {
        if (window.controlAPI && typeof window.controlAPI.openPreviewWindow === "function") {
          window.controlAPI.openPreviewWindow();
        }
      });
    }
    bindPopout(document.getElementById("preview-popout-btn"));
    bindPopout(document.getElementById("hdr-popout-btn"));

    // ── Chỉnh size block preview trong control ──────────────────
    const sizeSlider = document.getElementById("preview-size");
    function applyPreviewSize(px) {
      const h = (px >= 36 && px <= 240) ? px : 36;
      document.documentElement.style.setProperty("--pv-thumb-h", h + "px");
      document.documentElement.style.setProperty("--pv-card-w", Math.round(h * 2.6) + "px");
      try { localStorage.setItem("preview_block_size", String(h)); } catch (_) {}
    }
    if (sizeSlider) {
      let savedSize = parseInt(localStorage.getItem("preview_block_size") || "36", 10);
      if (!(savedSize >= 36 && savedSize <= 240)) savedSize = 36;
      sizeSlider.value = String(savedSize);
      applyPreviewSize(savedSize);
      sizeSlider.addEventListener("input", function () {
        applyPreviewSize(parseInt(sizeSlider.value, 10) || 36);
      });
    }

    // ── Nhận action từ cửa sổ preview nổi → điều khiển slot ──────
    if (window.controlAPI && typeof window.controlAPI.on === "function") {
      window.controlAPI.on("preview:action", function (d) {
        if (!d || !d.action) return;
        const id = Number(d.slotId) || 0;
        switch (d.action) {
          case "start":
            if (typeof window.__detectlabStartSlot === "function") window.__detectlabStartSlot(id);
            break;
          case "pause":
            if (typeof window.__detectlabPauseSlot === "function") window.__detectlabPauseSlot(id);
            break;
          case "startAll":
            if (typeof window.__detectlabStartAll === "function") window.__detectlabStartAll();
            break;
          case "pauseAll":
            if (typeof window.__detectlabPauseAll === "function") window.__detectlabPauseAll();
            break;
          case "open":
            if (window.controlAPI.openSlot) window.controlAPI.openSlot(id);
            break;
          case "close":
            if (window.controlAPI.closeSlot) window.controlAPI.closeSlot(id);
            break;
          case "show":
            if (window.controlAPI.setSlotVisible) window.controlAPI.setSlotVisible(id, true);
            break;
        }
      });
    }

    // ── Build card DOM ──────────────────────────────────────────
    function buildCard(slotId) {
      const card = document.createElement("div");
      card.className = "slot-preview-card";
      card.dataset.slot = slotId;

      // Thumbnail
      const thumb = document.createElement("img");
      thumb.className = "slot-thumbnail";
      thumb.alt = "";
      thumb.src = slotInfo[slotId].thumbDataUrl || "";
      if (!slotInfo[slotId].thumbDataUrl) thumb.style.opacity = "0";
      thumb.title = "Double-click to show slot window";
      // Double-click thumbnail → hiện lại cửa sổ slot (sau khi minimize/off-screen)
      thumb.addEventListener("dblclick", function (e) {
        e.stopPropagation();
        if (window.controlAPI && typeof window.controlAPI.setSlotVisible === "function") {
          window.controlAPI.setSlotVisible(slotId, true);
        }
      });
      card.appendChild(thumb);

      // Status overlay
      const overlay = document.createElement("div");
      overlay.className = "slot-status-overlay";
      const dot = document.createElement("span");
      dot.className = "slot-status-dot " + slotInfo[slotId].status;
      const txt = document.createElement("span");
      txt.className = "slot-status-text";
      txt.textContent = slotInfo[slotId].statusText || ("Slot " + slotId);
      overlay.appendChild(dot);
      overlay.appendChild(txt);
      card.appendChild(overlay);

      // Step bar
      const stepBar = document.createElement("div");
      stepBar.className = "slot-step-bar";
      const stepLabel = document.createElement("span");
      stepLabel.className = "slot-step-label";
      stepLabel.textContent = "S" + slotId + " step";
      const stepName = document.createElement("span");
      stepName.className = "slot-step-name idle";
      stepName.textContent = "idle";
      stepBar.appendChild(stepLabel);
      stepBar.appendChild(stepName);
      card.appendChild(stepBar);

      // Footer
      const footer = document.createElement("div");
      footer.className = "slot-footer";
      const lbl = document.createElement("span");
      lbl.className = "slot-footer-label";
      lbl.textContent = "S" + slotId;
      const urlEl = document.createElement("span");
      urlEl.className = "slot-footer-url";
      urlEl.title = slotInfo[slotId].url || "";
      urlEl.textContent = _shortUrl(slotInfo[slotId].url);
      const actBtns = document.createElement("div");
      actBtns.className = "slot-action-btns";

      // Open / Close button
      const openBtn = document.createElement("button");
      openBtn.textContent = slotInfo[slotId].open ? "Close" : "Open";
      openBtn.onclick = function (e) {
        e.stopPropagation();
        if (!window.controlAPI) return;
        if (slotInfo[slotId].open) {
          window.controlAPI.closeSlot(slotId);
        } else {
          window.controlAPI.openSlot(slotId);
        }
      };
      actBtns.appendChild(openBtn);

      // Start button (per-slot)
      const startBtn = document.createElement("button");
      startBtn.textContent = "▶";
      startBtn.title = "Start / Resume slot " + slotId;
      startBtn.className = "slot-run-btn slot-start-btn";
      startBtn.onclick = function (e) {
        e.stopPropagation();
        if (typeof window.__detectlabStartSlot === "function") {
          window.__detectlabStartSlot(slotId);
        }
      };
      actBtns.appendChild(startBtn);

      // Pause button (per-slot)
      const pauseBtn = document.createElement("button");
      pauseBtn.textContent = "⏸";
      pauseBtn.title = "Pause slot " + slotId;
      pauseBtn.className = "slot-run-btn slot-pause-btn";
      pauseBtn.onclick = function (e) {
        e.stopPropagation();
        if (typeof window.__detectlabPauseSlot === "function") {
          window.__detectlabPauseSlot(slotId);
        }
      };
      actBtns.appendChild(pauseBtn);

      // Show button — đưa cửa sổ slot trở lại màn hình (sau khi minimize/off-screen)
      const showBtn = document.createElement("button");
      showBtn.textContent = "👁";
      showBtn.title = "Hiện lại cửa sổ slot " + slotId;
      showBtn.className = "slot-run-btn";
      showBtn.onclick = function (e) {
        e.stopPropagation();
        if (window.controlAPI && typeof window.controlAPI.setSlotVisible === "function") {
          window.controlAPI.setSlotVisible(slotId, true);
        }
      };
      actBtns.appendChild(showBtn);

      footer.appendChild(lbl);
      footer.appendChild(urlEl);
      footer.appendChild(actBtns);
      card.appendChild(footer);

      // Click card → switch active slot
      card.addEventListener("click", function () {
        // detectlab_app-2.js expose switchToSlot qua window nếu cần;
        // ở đây dùng event để thông báo
        switchActiveSlot(slotId);
      });

      return card;
    }

    // ── Render / refresh toàn bộ list ───────────────────────────
    function renderPreviewList() {
      const container = pinned ? pinnedBar : previewList;
      container.innerHTML = "";

      for (let i = 1; i <= MAX_SLOTS; i++) {
        const card = buildCard(i);
        if (i === activeSlotId) card.classList.add("active-slot");
        container.appendChild(card);
      }

      // Xoá container còn lại
      if (pinned) {
        previewList.innerHTML = "";
      } else {
        pinnedBar.innerHTML = "";
      }
    }

    // ── Update một card đã render (không rebuild toàn bộ) ────────
    function patchCard(slotId, patcher) {
      const cards = document.querySelectorAll(".slot-preview-card[data-slot='" + slotId + "']");
      cards.forEach(card => patcher(card));
    }

    function patchThumbnail(slotId, dataUrl) {
      patchCard(slotId, card => {
        const img = card.querySelector(".slot-thumbnail");
        if (!img) return;
        img.src = dataUrl;
        img.style.opacity = "1";
      });
    }

    function patchStatus(slotId, status, text) {
      patchCard(slotId, card => {
        const dot = card.querySelector(".slot-status-dot");
        if (dot) {
          dot.className = "slot-status-dot " + status;
        }
        const txt = card.querySelector(".slot-status-text");
        if (txt && text !== undefined) txt.textContent = text;
      });
    }

    function patchUrl(slotId, url) {
      patchCard(slotId, card => {
        const urlEl = card.querySelector(".slot-footer-url");
        if (urlEl) {
          urlEl.title = url;
          urlEl.textContent = _shortUrl(url);
        }
      });
    }

    function patchOpenBtn(slotId, isOpen) {
      patchCard(slotId, card => {
        const btn = card.querySelector(".slot-action-btns button");
        if (btn) btn.textContent = isOpen ? "Close" : "Open";
      });
    }

    function patchStepBar(slotId, stepText, isRunning) {
      patchCard(slotId, card => {
        const el = card.querySelector(".slot-step-name");
        if (!el) return;
        el.textContent = stepText || "idle";
        el.className = "slot-step-name" + (isRunning ? "" : " idle");
      });
    }

    function patchActiveHighlight(newSlotId) {
      document.querySelectorAll(".slot-preview-card").forEach(c => {
        c.classList.toggle("active-slot", Number(c.dataset.slot) === newSlotId);
      });
    }

    // ── Helpers ─────────────────────────────────────────────────
    function _shortUrl(url) {
      if (!url) return "—";
      try {
        const u = new URL(url);
        return u.hostname + (u.pathname.length > 1 ? u.pathname.slice(0, 24) : "");
      } catch { return url.slice(0, 30); }
    }

    // ── Switch active slot ───────────────────────────────────────
    function switchActiveSlot(slotId) {
      if (slotId === activeSlotId) return;
      activeSlotId = slotId;
      patchActiveHighlight(slotId);
      // Thông báo cho detectlab_app-2.js nếu nó expose switchToSlot
      if (typeof window.__detectlabSwitchSlot === "function") {
        window.__detectlabSwitchSlot(slotId);
      }
    }

    // ── Layout toggle (dọc ↔ ngang trong preview panel) ──────────
    function applyLayout(isHorizontal) {
      layoutH = isHorizontal;
      previewList.classList.toggle("layout-horizontal", isHorizontal);
      if (layoutBtn) {
        layoutBtn.textContent = isHorizontal ? "↔ Ngang" : "↕ Dọc";
        layoutBtn.title = isHorizontal ? "Chuyển về dọc" : "Chuyển sang ngang";
      }
      try { localStorage.setItem("preview_layout", isHorizontal ? "h" : "v"); } catch(_) {}
    }

    if (layoutBtn) {
      layoutBtn.addEventListener("click", () => applyLayout(!layoutH));
    }

    // ── Pin / unpin toggle ───────────────────────────────────────
    function applyPin(isPinned) {
      pinned = isPinned;
      pinBtn.classList.toggle("pinned", isPinned);
      pinBtn.textContent = isPinned ? "⊟ Unpin" : "⊞ Pin";
      appShell.classList.toggle("preview-pinned", isPinned);
      // Khi pin → layout-horizontal không còn ý nghĩa (pinned-bar tự ngang)
      // Khi unpin → khôi phục layout cũ
      if (!isPinned) applyLayout(layoutH);
      renderPreviewList();
      try { localStorage.setItem("preview_pinned", isPinned ? "1" : "0"); } catch(_) {}
    }

    pinBtn.addEventListener("click", () => applyPin(!pinned));

    // ── IPC event listeners (via controlAPI.on) ─────────────────
    function bindEvents() {
      if (!window.controlAPI || typeof window.controlAPI.on !== "function") {
        // Retry sau khi preload xong
        setTimeout(bindEvents, 200);
        return;
      }

      // Thumbnail frames từ main (2fps)
      window.controlAPI.on("slot:thumbnail", function (data) {
        if (!data || !data.slotId) return;
        const id = Number(data.slotId);
        slotInfo[id].thumbDataUrl = data.dataUrl;
        patchThumbnail(id, data.dataUrl);
      });

      // Trang load xong → update URL
      window.controlAPI.on("slot:page-loaded", function (data) {
        if (!data || !data.slotId) return;
        const id = Number(data.slotId);
        slotInfo[id].url = data.url || "";
        slotInfo[id].open = true;
        patchUrl(id, slotInfo[id].url);
        patchOpenBtn(id, true);
      });

      // Slot bị đóng
      window.controlAPI.on("slot:closed", function (data) {
        if (!data || !data.slotId) return;
        const id = Number(data.slotId);
        slotInfo[id].open = false;
        slotInfo[id].url = "";
        slotInfo[id].thumbDataUrl = null;
        slotInfo[id].status = "idle";
        slotInfo[id].statusText = "";
        patchOpenBtn(id, false);
        patchUrl(id, "");
        patchStatus(id, "idle", "Slot " + id);
        patchCard(id, card => {
          const img = card.querySelector(".slot-thumbnail");
          if (img) { img.src = ""; img.style.opacity = "0"; }
        });
      });

      // Poll slot states từ detectlab_app-2.js để hiển thị step name (300ms)
      setInterval(function () {
        const states = window.__DL_SLOT_STATES__;
        if (!states) return;
        const pvStates = [];
        for (let i = 1; i <= MAX_SLOTS; i++) {
          const st = states[i];
          if (!st) continue;
          const running = !!st.running && !st.stopped;
          const row = st.currentRowRunning;
          const label = running
            ? (row ? "r" + row + (st.currentStepName ? " • " + st.currentStepName : "") : (st.currentStepName || "running"))
            : (st.paused ? "paused" + (row ? " r" + row : "") : (row ? "row " + row : "idle"));
          patchStepBar(i, label, running);
          pvStates.push({
            slotId: i,
            label: label,
            running: running,
            status: running ? "running" : (st.paused ? "paused" : (slotInfo[i] ? slotInfo[i].status : "idle")),
            open: slotInfo[i] ? !!slotInfo[i].open : false
          });
        }
        // Đẩy state sang cửa sổ preview nổi (nếu đang mở)
        if (window.controlAPI && typeof window.controlAPI.pushPreviewStates === "function") {
          window.controlAPI.pushPreviewStates({ states: pvStates });
        }
      }, 300);

      // web:result mang status / log của slot
      window.controlAPI.on("web:result", function (data) {
        if (!data || !data.slotId) return;
        const id = Number(data.slotId);
        const type = data.type;

        if (type === "detectlab_status" || type === "detectlab_log") {
          const msg = String(data.message || "").slice(0, 60);
          // Xác định trạng thái từ nội dung message
          let status = slotInfo[id].status;
          const lower = msg.toLowerCase();
          if (lower.includes("running") || lower.includes("start")) status = "running";
          else if (lower.includes("paused") || lower.includes("pause")) status = "paused";
          else if (lower.includes("stopped") || lower.includes("stop") || lower.includes("done")) status = "stopped";
          else if (lower.includes("loaded") || lower.includes("opening")) status = "idle";
          slotInfo[id].status = status;
          slotInfo[id].statusText = msg;
          patchStatus(id, status, msg);
        }

        if (type === "detectlab_running") {
          slotInfo[id].status = "running";
          patchStatus(id, "running", "Running...");
        }
        if (type === "detectlab_paused") {
          slotInfo[id].status = "paused";
          patchStatus(id, "paused", "Paused");
        }
        if (type === "detectlab_stopped") {
          slotInfo[id].status = "stopped";
          patchStatus(id, "stopped", "Stopped");
        }
      });
    }

    // ── Expose switchToSlot cho detectlab_app-2.js gọi ──────────
    // detectlab_app-2 gọi switchToSlot(id) → ta hook vào
    // Cũng cần sync activeSlotId khi detectlab chuyển slot qua tab
    window.__previewSetActiveSlot = function (slotId) {
      const id = Number(slotId);
      if (id === activeSlotId) return;
      activeSlotId = id;
      patchActiveHighlight(id);
    };

    // ── Init — restore localStorage, render, bind ────────────────
    (function restoreState() {
      try {
        const savedLayout = localStorage.getItem("preview_layout");
        const savedPin    = localStorage.getItem("preview_pinned");
        // Layout trước (sẽ áp dụng sau khi pin/unpin)
        if (savedLayout === "h") layoutH = true;
        // Pin state
        if (savedPin === "1") {
          // Áp dụng pin trực tiếp (không gọi applyPin vì chưa có cards)
          pinned = true;
          pinBtn.classList.add("pinned");
          pinBtn.textContent = "⊟ Unpin";
          appShell.classList.add("preview-pinned");
        }
      } catch(_) {}
    })();

    renderPreviewList();

    // Sau khi render: áp dụng layout nếu không pin
    if (!pinned) applyLayout(layoutH);

    bindEvents();
  })();
  </script>
</body>
</html>
